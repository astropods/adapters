name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  publish:
    name: Build & Publish NPM Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bunx lerna run build

      - name: Create release branch
        run: |
          BRANCH="release/$(date +'%Y-%m-%d-%H%M%S')"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Version packages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          bunx lerna version --yes --no-push --force-git-tag

      - name: Publish
        run: bunx lerna publish from-git --yes

      - name: Push release branch and tags
        run: |
          git push origin $BRANCH
          git push origin --tags

      - name: Open and auto-merge pull request
        run: |
          gh pr create \
            --base main \
            --head $BRANCH \
            --title "chore: release" \
            --body "Automated version bump by lerna. Merge to update \`main\` with the release commits and tags."
          gh pr merge $BRANCH --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
