name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  publish:
    name: Build & Publish NPM Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bunx lerna run build

      - name: Create release branch
        run: |
          BRANCH="release/$(date +'%Y-%m-%d-%H%M%S')"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Version packages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          bunx lerna version --yes --no-push

      - name: Push release branch and tags
        run: |
          git push origin $BRANCH
          git push origin --tags

      - name: Publish
        run: bunx lerna publish from-package --yes

      - name: Open pull request
        run: |
          CHANGES=$(git log --oneline origin/main..HEAD)
          PACKAGES=$(bunx lerna ls --json 2>/dev/null | jq -r '.[] | "- \(.name)@\(.version)"' || echo "See workflow logs")
          BODY=$(printf "## Release\n\nAutomated release generated by the publish workflow.\n\n### Changes\n%s\n\n### Published packages\n%s\n\nMerging this PR will update main with the version bump commits." "$CHANGES" "$PACKAGES")
          gh pr create \
            --base main \
            --head $BRANCH \
            --title "🚀 chore(release): $(date +'%Y-%m-%d') package releases" \
            --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge pull request
        run: gh pr merge $BRANCH --rebase --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
