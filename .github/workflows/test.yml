name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx lerna run build

      - name: Test
        run: bunx lerna run test

  test-python:
    name: Test Python packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: astropods-adapter-core
            path: packages/core-py
          - name: astropods-adapter-langchain
            path: packages/langchain

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and dev dependencies
        working-directory: ${{ matrix.package.path }}
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: ${{ matrix.package.path }}
        run: pytest
